<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>藏鋒資本 Glacier Capital｜趨勢選股</title>
  <link rel="icon" type="image/png" href="logo-mark.png">
  <link rel="apple-touch-icon" href="logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      /* 藏鋒資本 Glacier Capital — 白底專業風（呼應官網）· 白卡 × 深藍字 × 金 accent */
      --bg: #f6f4ef;                              /* 暖米白底（官網感）*/
      --bg-deep: #eeebe3;
      --surface: #ffffff;                         /* 白卡片 */
      --surface-hover: #fbfaf6;
      --surface-strong: #f1ede4;
      --border: rgba(12, 36, 67, 0.10);           /* 深藍調淡邊框 */
      --border-hover: rgba(176, 151, 101, 0.55);  /* 金 hover */
      --text: #16263f;                            /* 深海軍藍黑字 */
      --text-dim: rgba(22, 38, 63, 0.60);
      --text-mid: rgba(22, 38, 63, 0.82);
      --accent: #a8895a;                          /* 香檳金（白底調深才清楚）*/
      --accent-glow: rgba(176, 151, 101, 0.22);
      --accent-solid: #b09765;                    /* 品牌金 */
      --gold: #b09765;
      --gold-bright: #9c8351;                     /* 白底上「亮金」其實要偏深 */
      --gold-deep: #7a6642;
      --navy: #0c2443;                            /* 深海軍藍（標題/hero）*/
      --teal-deep: #133f44;                       /* 冰川墨綠 */
      --green: #159d54;                           /* 漲（白底深綠）*/
      --green-dim: rgba(21, 157, 84, 0.10);
      --red: #d33f3f;                             /* 跌（白底深紅）*/
      --red-dim: rgba(211, 63, 63, 0.10);
      --orange: #b45309;
      --tag-vcp: #2563a8;                         /* 深冰藍 */
      --tag-sanxian: #6d4fa0;                     /* 深冰晶紫 */
      --tag-strong: #15864a;
      --tag-newhigh: #997327;                     /* 深金 */
      --glass-blur: 0px;                          /* 白底不需玻璃模糊 */
      --card-shadow: 0 4px 20px rgba(12, 36, 67, 0.07), 0 1px 3px rgba(12, 36, 67, 0.05);
      --card-shadow-hover: 0 10px 32px rgba(12, 36, 67, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(ellipse at 18% 22%, rgba(176, 151, 101, 0.10) 0%, transparent 42%),
                  radial-gradient(ellipse at 86% 90%, rgba(12, 36, 67, 0.06) 0%, transparent 50%);
      animation: bgShift 24s ease-in-out infinite alternate;
      z-index: 0; pointer-events: none;
    }

    /* 冰山幾何紋理疊層（白底極淡）*/
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(12, 36, 67, 0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(12, 36, 67, 0.022) 1px, transparent 1px);
      background-size: 56px 56px;
      -webkit-mask-image: radial-gradient(ellipse at 50% 0%, black, transparent 68%);
      mask-image: radial-gradient(ellipse at 50% 0%, black, transparent 68%);
      z-index: 0; pointer-events: none; opacity: 0.5;
    }

    @keyframes bgShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-5%, 3%) rotate(3deg); }
    }

    .container {
      max-width: 920px; margin: 0 auto; padding: 32px 20px;
      position: relative; z-index: 1;
    }

    /* === Glass mixin-like base === */
    .glass {
      background: var(--surface);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
    }

    /* Header — 藏鋒資本 Glacier Capital */
    header { text-align: center; margin-bottom: 38px; padding-top: 14px; }

    .brand {
      display: inline-flex; flex-direction: column; align-items: center; gap: 12px;
      animation: brandRise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes brandRise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 官網原版 LOGO（冰山），保持原始 400:353 比例不變形 */
    .brand-logo {
      width: 124px; height: auto; aspect-ratio: 400 / 353;
      object-fit: contain;
      filter: drop-shadow(0 6px 20px rgba(176, 151, 101, 0.28));
      animation: logoIn 0.9s ease-out both;
    }
    @keyframes logoIn {
      from { opacity: 0; transform: translateY(6px) scale(0.96); }
      to   { opacity: 1; transform: none; }
    }

    .brand-zh {
      font-family: 'Noto Serif TC', 'Songti TC', serif;
      font-size: 33px; font-weight: 900; letter-spacing: 10px; line-height: 1.1;
      padding-left: 10px;  /* 補償字距造成的右偏 */
      background: linear-gradient(140deg, #6f5c39 0%, #a8895a 48%, #7a6642 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .brand-en {
      font-size: 11px; font-weight: 600; letter-spacing: 6px; margin-top: 5px;
      color: var(--gold); text-transform: uppercase; padding-left: 6px;
    }
    .brand-divider {
      width: 46px; height: 1px; margin: 4px auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    header p {
      color: var(--text-dim); font-size: 13px; letter-spacing: 1px; margin-top: 14px;
    }

    /* 市場主切換 台股/美股 */
    .market-switch {
      display: flex; gap: 10px; margin-bottom: 22px;
      animation: brandRise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.12s both;
    }
    .market-tab {
      flex: 1; padding: 15px 20px; border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface); backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      color: var(--text-dim); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: all 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .market-tab-zh {
      font-family: 'Noto Serif TC', 'Songti TC', serif;
      font-size: 20px; font-weight: 700; letter-spacing: 5px; padding-left: 5px;
    }
    .market-tab-en {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.62;
    }
    .market-tab:hover { border-color: var(--border-hover); color: var(--text-mid); transform: translateY(-1px); }
    .market-tab.active {
      color: #081320;
      background: linear-gradient(140deg, var(--gold-bright), var(--gold) 55%, var(--gold-deep));
      border-color: var(--gold-bright);
      box-shadow: 0 10px 28px var(--accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }
    .market-tab.active .market-tab-en { opacity: 0.55; }

    /* Mode tabs */
    .mode-tabs {
      display: flex; gap: 0; margin-bottom: 24px;
      background: var(--surface); backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-radius: var(--radius-sm); padding: 4px;
      border: 1px solid var(--border);
    }

    .mode-tab {
      flex: 1; padding: 11px 16px; text-align: center;
      border: none; background: transparent; color: var(--text-dim);
      cursor: pointer; font-size: 14px; font-weight: 600;
      border-radius: 8px; transition: all 0.3s ease;
    }

    .mode-tab:hover { color: var(--text); background: rgba(12, 36, 67,0.04); }

    .mode-tab.active {
      background: linear-gradient(135deg, var(--accent-solid), var(--gold-deep));
      color: #081320;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    /* Search box */
    .search-box { position: relative; margin-bottom: 20px; }

    .search-box input[type="text"] {
      width: 100%; padding: 14px 20px 14px 48px; font-size: 16px;
      background: var(--surface); backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); outline: none;
      transition: all 0.3s ease;
    }

    .search-box input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-box input[type="text"]::placeholder { color: var(--text-dim); }

    .search-box .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--text-dim); font-size: 18px;
    }

    /* Date picker row */
    .date-picker-row {
      display: flex; gap: 10px; margin-bottom: 16px; align-items: center;
    }

    .date-picker-row input[type="date"] {
      flex: 1; padding: 12px 16px; font-size: 15px;
      background: var(--surface); backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); outline: none;
      transition: all 0.3s ease;
    }

    .date-picker-row input[type="date"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .date-picker-row input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
    }

    .date-nav-btn {
      padding: 10px 14px; background: var(--surface);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-mid); cursor: pointer; font-size: 16px;
      transition: all 0.3s ease; min-width: 44px; text-align: center;
    }

    .date-nav-btn:hover {
      border-color: var(--accent); color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .date-quick-btns {
      display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto;
      padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none;
    }
    .date-quick-btns::-webkit-scrollbar { display: none; }

    .date-quick-btn {
      padding: 5px 12px; border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: var(--surface); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-dim); cursor: pointer;
      font-size: 12px; transition: all 0.25s ease; flex-shrink: 0;
    }

    .date-quick-btn:hover {
      border-color: var(--accent); color: var(--text);
      background: rgba(129, 140, 248, 0.08);
    }

    /* Filters */
    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

    .filter-btn {
      padding: 7px 16px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-dim); cursor: pointer;
      font-size: 13px; font-weight: 500; transition: all 0.25s ease;
    }

    .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }

    .filter-btn.active {
      background: linear-gradient(135deg, var(--accent-solid), var(--gold-deep));
      border-color: transparent; color: #081320;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    .filter-label { font-size: 13px; color: var(--text-dim); margin-right: 4px; white-space: nowrap; }

    /* Sort buttons */
    .sort-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .sort-label { font-size: 13px; color: var(--text-dim); margin-right: 4px; }

    .sort-btn {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-dim); cursor: pointer;
      font-size: 12px; font-weight: 500; transition: all 0.25s ease;
    }

    .sort-btn:hover { border-color: var(--border-hover); color: var(--text); }

    .sort-btn.active {
      background: linear-gradient(135deg, var(--accent-solid), var(--gold-deep));
      border-color: transparent; color: #081320;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    /* TV export button */
    .tv-btn {
      margin-left: auto;
      background: rgba(176, 151, 101, 0.16) !important;
      color: var(--gold-deep) !important;
      border-color: rgba(176, 151, 101, 0.42) !important;
      font-weight: 700 !important;
    }
    .tv-btn + .tv-btn { margin-left: 8px; }  /* 第二顆緊貼第一顆靠右 */
    .tv-btn:hover {
      background: rgba(176, 151, 101, 0.24) !important;
      border-color: var(--gold) !important;
      color: var(--gold-bright) !important;
    }
    .tv-btn.copied {
      background: rgba(94, 201, 138, 0.16) !important;
      color: var(--green) !important;
      border-color: rgba(94, 201, 138, 0.32) !important;
    }

    /* Footer info */
    #footerInfo { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }

    /* Loading & empty */
    .loading { text-align: center; padding: 80px 0; color: var(--text-dim); }

    .spinner {
      display: inline-block; width: 36px; height: 36px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-dim); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
    .empty-state p { font-size: 15px; }

    /* Results */
    .results { display: flex; flex-direction: column; gap: 10px; }

    /* Stock card (search mode) */
    .stock-card {
      background: var(--surface); backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: all 0.3s ease;
    }

    .stock-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--card-shadow-hover);
    }

    .stock-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; cursor: pointer; user-select: none;
      transition: background 0.2s ease;
    }

    .stock-header:hover { background: rgba(12, 36, 67, 0.03); }

    .stock-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .stock-id {
      font-size: 18px; font-weight: 700; color: var(--accent);
      letter-spacing: -0.3px;
    }

    .stock-name { font-size: 15px; color: var(--text); font-weight: 500; }

    .appearance-count {
      font-size: 13px; color: var(--text-dim);
      display: flex; align-items: center; gap: 6px; white-space: nowrap;
    }

    .appearance-count strong { color: var(--accent); font-size: 20px; font-weight: 800; }

    .stock-details { display: none; }
    .stock-card.open .stock-details { display: block; }

    .appearance-list { padding: 0 20px 16px; }

    .appearance-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: var(--radius-xs); margin-bottom: 4px;
      font-size: 14px; background: rgba(12, 36, 67, 0.02);
      transition: all 0.2s ease;
    }

    .appearance-item:hover { background: rgba(12, 36, 67, 0.06); }

    .date-text { font-weight: 600; min-width: 100px; font-variant-numeric: tabular-nums; color: var(--text-mid); }

    /* Tags */
    .tag {
      font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600;
      position: relative; cursor: pointer; white-space: nowrap;
      transition: all 0.2s ease; letter-spacing: 0.2px;
    }

    .tag:hover { transform: translateY(-1px); }

    .tooltip {
      display: none; position: absolute; bottom: calc(100% + 10px); left: 50%;
      transform: translateX(-50%);
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 16px; font-size: 12px; font-weight: 400;
      color: var(--text); white-space: nowrap; z-index: 100;
      box-shadow: 0 10px 32px rgba(12, 36, 67, 0.20), 0 0 0 1px rgba(176, 151, 101, 0.12);
      line-height: 1.8;
    }

    .tooltip::after {
      content: ''; position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%); border: 6px solid transparent;
      border-top-color: #ffffff;
    }

    /* Desktop hover + click toggle */
    .tag:hover .tooltip { display: block; }
    .tag.tooltip-open .tooltip { display: block; }

    /* Floating variant: attached to <body> with position:fixed so it escapes
       the sheet's overflow clipping (.sheet-cell overflow:hidden / .sheet-scroll overflow-x). */
    .tooltip.floating {
      display: block; position: fixed; bottom: auto; left: 0; top: 0;
      transform: translate(-50%, -100%);
    }

    .tooltip .t-label { color: var(--text-dim); }
    .tooltip .t-val { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }
    .tooltip .t-pass { color: var(--green); }
    .tooltip .t-fail { color: var(--red); }

    /* Tooltip mobile */
    @media (max-width: 600px) {
      .tag .tooltip {
        left: 0; transform: none; max-width: 280px; white-space: normal;
      }
      .tag .tooltip::after { left: 20px; transform: none; }
      /* Floating variant keeps its JS-driven transform; just allow wrapping */
      .tooltip.floating { max-width: 78vw; white-space: normal; }
    }

    .tag.vcp { background: rgba(127, 180, 207, 0.12); color: var(--tag-vcp); border: 1px solid rgba(127, 180, 207, 0.25); }
    .tag.sanxian { background: rgba(167, 139, 250, 0.12); color: var(--tag-sanxian); border: 1px solid rgba(167, 139, 250, 0.2); }
    .tag.strong { background: rgba(52, 211, 153, 0.12); color: var(--tag-strong); border: 1px solid rgba(52, 211, 153, 0.2); }
    .tag.newhigh { background: rgba(251, 191, 36, 0.12); color: var(--tag-newhigh); border: 1px solid rgba(251, 191, 36, 0.2); }

    .detail-value {
      font-size: 13px; color: var(--text-dim); margin-left: auto;
      font-variant-numeric: tabular-nums; white-space: nowrap;
    }
    .detail-label { color: var(--text-dim); font-size: 11px; margin-right: 3px; }

    .detail-value.positive { color: var(--green); }
    .detail-value.negative { color: var(--red); }

    .industry-text { font-size: 12px; color: var(--text-dim); }

    /* Section header (date mode) */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px;
      color: var(--text);
    }

    .section-count { font-size: 13px; color: var(--text-dim); }

    /* === 試算表風清單（Google Sheet / Excel 感）=== */
    .sheet {
      background: #fff; border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; box-shadow: var(--card-shadow);
      animation: brandRise 0.5s ease both;
    }
    .sheet-scroll { overflow-x: auto; }
    .sheet-head, .sheet-row {
      display: grid;
      grid-template-columns: 48px 82px minmax(94px, 1.1fr) minmax(156px, 1.3fr) minmax(82px, 0.9fr) 98px 98px;
      align-items: stretch; min-width: 690px;
    }
    /* 欄位標題列：深藍底、凍結在頂 */
    .sheet-head {
      background: #efe7d6; color: #16263f;
      font-size: 12px; font-weight: 700; letter-spacing: 0.6px;
      border-bottom: 2px solid var(--gold);
      position: sticky; top: 0; z-index: 5;
    }
    .sheet-head > span {
      padding: 12px 10px; display: flex; align-items: center;
      border-right: 1px solid rgba(22, 38, 63, 0.10);
    }
    .sheet-head > span:last-child { border-right: none; }
    .sheet-head .num { justify-content: flex-end; }
    /* 資料列：斑馬紋 + 格線 + hover 整列 */
    .sheet-row {
      font-size: 13px; border-top: 1px solid var(--border);
      transition: background 0.14s ease;
    }
    .sheet-row:nth-child(even) { background: #faf8f2; }
    .sheet-row:hover { background: rgba(176, 151, 101, 0.12); }
    .sheet-row.is-new { box-shadow: inset 3px 0 0 0 var(--green); }
    .sheet-cell {
      padding: 9px 10px; display: flex; align-items: center; gap: 5px;
      border-right: 1px solid var(--border); min-width: 0; overflow: hidden;
    }
    .sheet-cell:last-child { border-right: none; }
    .sheet-cell.num {
      justify-content: flex-end; font-variant-numeric: tabular-nums; font-weight: 700;
    }
    .sheet-cell.num.positive { color: var(--green); }
    .sheet-cell.num.negative { color: var(--red); }
    .sheet-cell.num.dash { color: var(--text-dim); font-weight: 400; }
    .sheet-cell .stock-id { font-size: 14px; font-weight: 700; color: var(--text); }
    .sheet-cell.c-name { font-weight: 500; color: var(--text); white-space: nowrap; text-overflow: ellipsis; }
    .sheet-cell.c-industry { font-size: 12px; color: var(--text-dim); white-space: nowrap; text-overflow: ellipsis; }
    .sheet-cell.sheet-tags { flex-wrap: wrap; gap: 4px; }

    /* Date stock row (legacy) */

    /* New/old stock markers */

    .new-old-label.is-new { background: var(--green-dim); color: var(--green); }
    .new-old-label.is-old { background: rgba(12, 36, 67,0.06); color: var(--text-dim); }

    .date-stock-row .stock-id { font-size: 15px; min-width: 70px; }

    .load-more-btn {

    /* ===== Mobile RWD ===== */
    @media (max-width: 600px) {
      body::before { display: none; }

      .container { padding: 16px 12px; }
      header { margin-bottom: 20px; }
      header h1 { font-size: 22px; }

      .mode-tabs { margin-bottom: 16px; }

      .date-picker-row { gap: 6px; margin-bottom: 10px; }

      .date-quick-btns {

      .date-quick-btns::-webkit-scrollbar { display: none; }

      .section-header { flex-direction: column; gap: 4px; align-items: flex-start; padding: 8px 0; margin-bottom: 6px; }
      .section-count { font-size: 11px; line-height: 1.4; }

      .stock-header { padding: 12px 14px; flex-direction: column; align-items: flex-start; gap: 8px; }
      .stock-info { gap: 8px; }
      .stock-id { font-size: 16px; }

      .appearance-count { font-size: 12px; }
      .appearance-count strong { font-size: 16px; }
      .appearance-list { padding: 0 10px 12px; }

      .appearance-item {
        flex-wrap: wrap; gap: 4px 8px; padding: 8px 10px; font-size: 13px;
      }
      .appearance-item .date-text { min-width: auto; font-size: 13px; }
      .appearance-item .detail-value { margin-left: 0; font-size: 12px; }
      .appearance-item .detail-label { font-size: 10px; }

      .date-stock-row {
        flex-wrap: wrap; gap: 4px 8px; padding: 8px 10px; font-size: 13px;
      }
      .date-stock-row .stock-id { font-size: 14px; min-width: auto; }
      .date-stock-row .stock-name { font-size: 13px; min-width: auto; }
      .date-stock-row .industry-text { flex: none; font-size: 11px; }
      .date-stock-row .detail-value { margin-left: 0; font-size: 12px; }
      .date-stock-row .detail-label { font-size: 10px; }

      .tag { white-space: nowrap; font-size: 10px; padding: 2px 6px; }
      .new-old-label { font-size: 10px; padding: 1px 6px; }

      .tag .tooltip { left: 0; transform: none; max-width: 280px; white-space: normal; }
      .tag .tooltip::after { left: 20px; transform: none; }
    }
    /* === 匯出教學 Modal === */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(12, 36, 67, 0.55);
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal {
      background: #fff; border-radius: 20px; border: 1px solid var(--border);
      max-width: 448px; width: 100%; padding: 30px 28px 24px; position: relative;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 30px 80px rgba(12, 36, 67, 0.32);
      transform: translateY(18px) scale(0.97);
      transition: transform 0.38s cubic-bezier(0.22, 1, 0.36, 1);

    .modal-overlay.show .modal { transform: translateY(0) scale(1); }
    .modal-close {
      position: absolute; top: 15px; right: 17px; background: none; border: none;

    .modal-icon {

    .modal-lead { font-size: 13px; color: var(--text-mid); text-align: center; margin-bottom: 16px; }
    .modal-body { margin-bottom: 20px; }
    .modal-step {
      position: relative; padding: 9px 12px 9px 40px; margin-bottom: 8px;
      background: var(--surface-strong); border-radius: 11px;
      font-size: 13px; line-height: 1.55; color: var(--text-mid);
    }
    .modal-step b { color: var(--text); }
    .modal-step::before {
      content: attr(data-n); position: absolute; left: 11px; top: 8px;
      width: 20px; height: 20px; border-radius: 50%;
      background: linear-gradient(140deg, var(--gold-deep), var(--gold-bright)); color: #fff;
      font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center;

      background: #fff; border: 1px solid var(--border-hover); border-radius: 5px;

    /* 教學截圖：響應式、點擊開新分頁看原圖 */

    .modal-figure img {
      width: 100%; display: block; border-radius: 10px; border: 1px solid var(--border);

    .modal-actions { display: flex; flex-direction: column; gap: 9px; }
    .modal-btn {
      display: block; padding: 15px 18px; border-radius: 12px; text-align: center;
      font-size: 16px; font-weight: 700; cursor: pointer; text-decoration: none;
      border: none; transition: all 0.25s; letter-spacing: 0.5px;

    }
    .modal-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 26px rgba(12, 36, 67, 0.35); }
    .modal-btn.secondary {
      background: #fff; color: var(--text); box-shadow: none;
      border: 1.5px solid var(--border-hover); font-weight: 600;

    .modal-btn.secondary:hover { background: var(--surface-strong); border-color: var(--gold); transform: none; }

    /* === 匯出操作提示 Toast === */
    .toast-wrap {
      position: fixed; left: 50%; bottom: 28px;
      transform: translateX(-50%) translateY(22px);
      z-index: 999; width: min(460px, calc(100vw - 32px));
      opacity: 0; pointer-events: none;
      transition: opacity 0.38s ease, transform 0.38s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .toast-wrap.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .toast {
      background: #ffffff;
      border: 1px solid var(--border); border-radius: 15px;
      padding: 16px 16px 16px 18px;
      box-shadow: 0 18px 50px rgba(12, 36, 67, 0.20), 0 0 0 1px rgba(176, 151, 101, 0.14);
      display: flex; gap: 13px; align-items: flex-start;
    }
    .toast-icon {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(140deg, var(--gold-deep), var(--gold-bright));
      display: flex; align-items: center; justify-content: center;
      color: #081320; font-size: 19px; font-weight: 800;
      box-shadow: 0 4px 14px rgba(176, 151, 101, 0.35);
    }
    .toast-body { flex: 1; min-width: 0; }
    .toast-title { font-size: 14px; font-weight: 800; color: var(--gold-bright); margin-bottom: 5px; letter-spacing: 0.3px; }
    .toast-desc { font-size: 12.5px; line-height: 1.6; color: var(--text-mid); }
    .toast-desc b { color: var(--text); font-weight: 700; }
    .toast-desc kbd {
      font-family: inherit; background: var(--surface-strong);
      border: 1px solid var(--border-hover); border-radius: 5px;
      padding: 1px 6px; font-size: 11.5px; color: var(--gold-bright); font-weight: 600;
    }
    .toast-step {
      display: block; margin-top: 6px; padding-left: 20px; position: relative;
    }
    .toast-step::before {
      content: attr(data-n); position: absolute; left: 0; top: 1px;
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--surface-strong); border: 1px solid var(--border-hover);
      color: var(--gold-bright); font-size: 9.5px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;

    .toast-close {
      flex-shrink: 0; background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 19px; line-height: 1; padding: 0 2px; transition: color 0.2s;
    }
    .toast-close:hover { color: var(--gold-bright); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <img class="brand-logo" src="logo-mark.png" alt="藏鋒資本 Glacier Capital Logo" width="400" height="353" />
        <div>
          <div class="brand-zh">藏鋒資本</div>
          <div class="brand-en">Glacier Capital</div>
          <div class="brand-divider"></div>
        </div>
      </div>
      <p>趨勢選股系統 · 搜尋股票或按日期查詢篩選清單</p>
    </header>

    <!-- 市場主切換：台股 / 美股（完全分開）-->
    <div class="market-switch" id="marketSwitch">
      <button class="market-tab active" data-market="tw">
        <span class="market-tab-zh">台股</span>
        <span class="market-tab-en">Taiwan</span>
      </button>
      <button class="market-tab" data-market="us">
        <span class="market-tab-zh">美股</span>
        <span class="market-tab-en">US Market</span>
      </button>
    </div>

    <!-- Mode tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="date">按日期查詢</button>
      <button class="mode-tab" data-mode="stock">搜尋股票</button>
    </div>

    <!-- Stock search (mode=stock) -->
    <div id="stockMode" class="hidden">
      <div class="search-box">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="輸入股票代號或名稱（例：2330、台積電、AAPL）" autocomplete="off">
      </div>
    </div>

    <!-- Date search (mode=date) -->
    <div id="dateMode">
      <div class="date-picker-row">
        <button class="date-nav-btn" id="datePrev" title="前一個有資料的日期">&#9664;</button>
        <input type="date" id="dateInput">
        <button class="date-nav-btn" id="dateNext" title="後一個有資料的日期">&#9654;</button>
      </div>
      <div class="date-quick-btns" id="dateQuickBtns"></div>
    </div>

    <!-- 篩選類型（市場已由頂部主切換決定）-->
    <div class="filters">
      <span class="filter-label">類型</span>
      <button class="filter-btn" data-filter="strong" data-group="type">VCP強勢</button>
      <button class="filter-btn" data-filter="newhigh" data-group="type">VCP新高</button>
      <button class="filter-btn" data-filter="sanxian" data-group="type">三線開花</button>
    </div>

    <!-- Sort (date mode only) -->
    <div class="sort-row" id="sortRow">
      <span class="sort-label">排序</span>
      <button class="sort-btn active" data-sort="new-first">新股優先</button>
      <button class="sort-btn" data-sort="return">20日漲幅</button>
      <button class="sort-btn" data-sort="gap">突破差距</button>
      <button class="sort-btn tv-btn" id="tvExportNewBtn" title="只複製「新股」的 TradingView 清單">複製TV清單（新股）</button>
      <button class="sort-btn tv-btn" id="tvExportAllBtn" title="複製目前篩選條件下全部股票的 TradingView 清單">複製TV清單（全部）</button>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>載入資料中...</p>
      </div>
    </div>

    <footer>
      <p id="footerInfo">載入中...</p>
      <p>藏鋒資本 Glacier Capital &copy; 2026 · 資料來源：FinMind + yfinance</p>
    </footer>
  </div>

  <!-- 匯出教學 Modal -->
  <div class="modal-overlay" id="exportModal" onclick="if(event.target===this)closeExportModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeExportModal()" aria-label="關閉">&times;</button>
      <div class="modal-icon">&#10003;</div>
      <h3 class="modal-title" id="modalTitle"></h3>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <!-- 匯出操作提示 -->
  <div class="toast-wrap" id="toastWrap">
    <div class="toast">
      <div class="toast-icon" id="toastIcon">&#10003;</div>
      <div class="toast-body">
        <div class="toast-title" id="toastTitle"></div>
        <div class="toast-desc" id="toastDesc"></div>
      </div>
      <button class="toast-close" onclick="document.getElementById('toastWrap').classList.remove('show')" aria-label="關閉">&times;</button>
    </div>
  </div>

  <script>
    // === State ===
    let INDEX = null;          // index.json: stocks master + months list
    let MONTH_CACHE = {};      // loaded month data: { "2026-03": [...] }
    let DATE_INDEX = {};       // { date -> [ entries ] } built from loaded months
    let STOCK_INDEX = {};      // { stock_id -> [ entries with date ] } reverse index for search
    let ALL_DATES = [];        // sorted desc, from all loaded months
    let currentMode = 'date';
    let activeFilters = { market: 'tw', types: new Set() };  // market: tw|us（頂部主切換）；types: multi-select
    let currentSort = 'new-first';
    let loadingMonths = new Set();
    let currentVisibleStocks = [];  // 目前畫面上的股票 [{stock_id, market}, ...]

    // === Data Loading ===
    async function fetchJSON(url) {
      const resp = await fetch(url + '?v=' + Date.now(), { cache: 'no-store' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    async function loadIndex() {
      try {
        INDEX = await fetchJSON('data/index.json');
        document.getElementById('footerInfo').textContent =
          `資料範圍 ${INDEX.first_date || '—'} ~ ${INDEX.last_date || '—'} | 共 ${INDEX.total_stocks.toLocaleString()} 檔股票、${INDEX.total_records.toLocaleString()} 筆紀錄 | 更新於 ${INDEX.generated_at}`;

        // Collect ALL dates from all months (we'll load data lazily)
        ALL_DATES = [];
        // Pre-load latest month for quick date buttons
        if (INDEX.months.length > 0) {
          await loadMonth(INDEX.months[0]);
          // 預載前兩個月供近 20 交易日新/舊比較
          if (INDEX.months.length > 1) loadMonth(INDEX.months[1]);
          if (INDEX.months.length > 2) loadMonth(INDEX.months[2]);
        }
        updateDateUI();
        // 預設日期模式：自動查詢最新日期
        if (currentMode === 'date' && ALL_DATES.length > 0) {
          searchByDate(ALL_DATES[0]);
        } else {
          showEmptyState();
        }
      } catch (err) {
        document.getElementById('content').innerHTML =
          `<div class="empty-state"><div class="icon">&#9888;</div><p>載入失敗: ${err.message}</p></div>`;
      }
    }

    async function loadMonth(month) {
      if (MONTH_CACHE[month]) return MONTH_CACHE[month];
      if (loadingMonths.has(month)) {
        // Wait for ongoing load
        while (loadingMonths.has(month)) await new Promise(r => setTimeout(r, 50));
        return MONTH_CACHE[month];
      }
      loadingMonths.add(month);
      try {
        const data = await fetchJSON(`data/months/${month}.json`);
        MONTH_CACHE[month] = data;
        // Merge into DATE_INDEX + STOCK_INDEX
        for (const e of data) {
          const sid = e.id;
          const stock = INDEX.stocks[sid];
          if (!stock) continue;
          const entry = {
            stock_id: sid, stock_name: stock.n, market: stock.m, industry: stock.i,
            date: e.d, type: e.t === 'sx' ? 'sanxian' : 'vcp',
            is_strong: !!e.s, is_new_high: !!e.h,
            return_20d: e.r ?? null, gap_ratio: e.g ?? null,
          };
          if (!DATE_INDEX[e.d]) DATE_INDEX[e.d] = [];
          DATE_INDEX[e.d].push(entry);
          if (!STOCK_INDEX[sid]) STOCK_INDEX[sid] = [];
          STOCK_INDEX[sid].push(entry);
        }
        // Rebuild ALL_DATES
        ALL_DATES = Object.keys(DATE_INDEX).sort().reverse();
        updateDateUI();
        return data;
      } finally {
        loadingMonths.delete(month);
      }
    }

    async function ensureDateLoaded(dateStr) {
      // 載入當月 + 前兩個月，確保近 20 交易日（最多跨前一月）的新/舊比較資料齊全
      let m = dateStr.substring(0, 7);
      for (let i = 0; i < 3; i++) {
        if (m && !MONTH_CACHE[m] && INDEX.months.includes(m)) {
          await loadMonth(m);
        }
        m = getPrevMonth(m);
      }
    }

    function getPrevMonth(m) {
      const [y, mo] = m.split('-').map(Number);
      const d = new Date(y, mo - 2, 1);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }

    function updateDateUI() {
      if (ALL_DATES.length === 0) return;
      const dateInput = document.getElementById('dateInput');
      if (!dateInput.value) dateInput.value = ALL_DATES[0];
      dateInput.min = INDEX.first_date || ALL_DATES[ALL_DATES.length - 1];
      dateInput.max = INDEX.last_date || ALL_DATES[0];
      // Quick date buttons (last 10)
      const quickContainer = document.getElementById('dateQuickBtns');
      const recent = ALL_DATES.slice(0, 10);
      quickContainer.innerHTML = recent.map(d =>
        `<button class="date-quick-btn" data-date="${d}">${d}</button>`
      ).join('');
      quickContainer.querySelectorAll('.date-quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById('dateInput').value = btn.dataset.date;
          searchByDate(btn.dataset.date);
        });
      });
    }

    function showEmptyState() {
      if (currentMode === 'stock') {
        document.getElementById('content').innerHTML =
          '<div class="empty-state"><div class="icon">&#128270;</div><p>輸入股票代號或名稱開始搜尋</p></div>';
      } else {
        document.getElementById('content').innerHTML =
          '<div class="empty-state"><div class="icon">&#128197;</div><p>選擇日期查看當天的篩選清單</p></div>';
      }
    }

    // === Stock Search ===
    function searchStock(query) {
      if (!INDEX || !query.trim()) { showEmptyState(); return; }
      const q = query.trim().toLowerCase();
      const matchedIds = [];
      for (const [sid, s] of Object.entries(INDEX.stocks)) {
        if (sid.toLowerCase().includes(q) || s.n.toLowerCase().includes(q)) {
          matchedIds.push(sid);
        }
      }
      if (matchedIds.length === 0) {
        document.getElementById('content').innerHTML =
          `<div class="empty-state"><div class="icon">&#128533;</div><p>找不到「${escapeHtml(query)}」的相關結果</p></div>`;
        return;
      }
      // Use STOCK_INDEX for O(1) lookup
      const results = matchedIds.map(sid => {
        const s = INDEX.stocks[sid];
        const all = STOCK_INDEX[sid] || [];
        const appearances = all.filter(e => {
          if (e.market !== activeFilters.market) return false;
          if (activeFilters.types.size > 0) {
            const match = (activeFilters.types.has('strong') && e.type === 'vcp' && e.is_strong)
              || (activeFilters.types.has('newhigh') && e.type === 'vcp' && e.is_new_high)
              || (activeFilters.types.has('sanxian') && e.type === 'sanxian');
            if (!match) return false;
          }
          return true;
        });
        const totalMonths = s.ms ? s.ms.length : 0;
        return { stock_id: sid, stock_name: s.n, market: s.m, industry: s.i, appearances, totalMonths };
      }).filter(s => s.appearances.length > 0 || s.totalMonths > 0);

      results.sort((a, b) => b.appearances.length - a.appearances.length);
      // Limit to top 50 to avoid rendering lag
      const totalFound = results.length;
      if (results.length > 50) results = results.slice(0, 50);
      if (results.length === 0) {
        document.getElementById('content').innerHTML =
          `<div class="empty-state"><div class="icon">&#128533;</div><p>找不到「${escapeHtml(query)}」的相關結果</p></div>`;
        return;
      }
      renderStockResults(results);
    }

    function renderStockResults(stocks) {
      let html = stocks.map(stock => {
        // Group by date using pre-filtered appearances
        const byDate = {};
        for (const e of stock.appearances) {
          const d = e.date;
          if (!byDate[d]) {
            byDate[d] = { date: d, is_strong: false, is_new_high: false, is_sanxian: false, return_20d: null, gap_ratio: null };
          }
          const bd = byDate[d];
          if (e.type === 'vcp') {
            if (e.is_strong) bd.is_strong = true;
            if (e.is_new_high) bd.is_new_high = true;
            if (e.return_20d != null) bd.return_20d = e.return_20d;
          } else {
            bd.is_sanxian = true;
            if (e.gap_ratio != null) bd.gap_ratio = e.gap_ratio;
          }
        }
        const merged = Object.values(byDate).sort((a, b) => b.date.localeCompare(a.date));
        const appearanceHtml = merged.map(a => renderAppearanceRow(a, stock.stock_id)).join('');
        const loadedMonths = Object.keys(MONTH_CACHE).length;
        const hasMore = stock.totalMonths > loadedMonths;
        const countLabel = hasMore
          ? `近期 <strong>${merged.length}</strong> 天（共 ${stock.totalMonths} 月）`
          : `出現 <strong>${merged.length}</strong> 天`;

        return `<div class="stock-card" onclick="if(!event.target.closest('.tag') && !event.target.closest('.load-more-btn'))this.classList.toggle('open')">
          <div class="stock-header">
            <div class="stock-info">
              <span class="stock-id">${escapeHtml(stock.stock_id)}</span>
              <span class="stock-name">${escapeHtml(stock.stock_name)}</span>
              <span class="industry-text">${escapeHtml(stock.industry)}</span>
            </div>
            <div class="appearance-count">${countLabel}</div>
          </div>
          <div class="stock-details"><div class="appearance-list">${appearanceHtml}</div></div>
        </div>`;
      }).join('');
      // "載入更多歷史" button
      const loadedCount = Object.keys(MONTH_CACHE).length;
      if (loadedCount < INDEX.months.length) {
        html += `<button class="load-more-btn" onclick="loadMoreMonths()">載入更多歷史（已載入 ${loadedCount}/${INDEX.months.length} 月）</button>`;
      }
      document.getElementById('content').innerHTML = `<div class="results">${html}</div>`;
    }

    async function loadMoreMonths() {
      const btn = document.querySelector('.load-more-btn');
      if (btn) btn.textContent = '載入中...';
      // 記住展開的卡片
      const openIds = new Set();
      document.querySelectorAll('.stock-card.open .stock-id').forEach(el => openIds.add(el.textContent));
      // 載入更多月份
      const toLoad = INDEX.months.filter(m => !MONTH_CACHE[m]).slice(0, 3);
      await Promise.all(toLoad.map(m => loadMonth(m)));
      const q = document.getElementById('searchInput').value;
      if (q.trim()) searchStock(q);
      // 恢復展開狀態
      if (openIds.size > 0) {
        document.querySelectorAll('.stock-card').forEach(card => {
          const idEl = card.querySelector('.stock-id');
          if (idEl && openIds.has(idEl.textContent)) card.classList.add('open');
        });
      }
    }

    // === Date Search ===
    async function searchByDate(dateStr) {
      if (!INDEX) return;
      document.getElementById('content').innerHTML =
        '<div class="loading"><div class="spinner"></div><p>載入資料中...</p></div>';
      await ensureDateLoaded(dateStr);

      let entries = DATE_INDEX[dateStr];
      if (!entries) {
        const closest = ALL_DATES.reduce((prev, curr) =>
          Math.abs(new Date(curr) - new Date(dateStr)) < Math.abs(new Date(prev) - new Date(dateStr)) ? curr : prev
        , ALL_DATES[0]);
        if (closest) {
          dateStr = closest;
          document.getElementById('dateInput').value = closest;
          await ensureDateLoaded(closest);
          entries = DATE_INDEX[closest];
        }
      }
      if (!entries || entries.length === 0) {
        document.getElementById('content').innerHTML =
          `<div class="empty-state"><div class="icon">&#128533;</div><p>${dateStr} 沒有篩選資料</p></div>`;
        return;
      }
      const filtered = entries.filter(e => {
        if (e.market !== activeFilters.market) return false;
        if (activeFilters.types.size > 0) {
          const match = (activeFilters.types.has('strong') && e.type === 'vcp' && e.is_strong)
            || (activeFilters.types.has('newhigh') && e.type === 'vcp' && e.is_new_high)
            || (activeFilters.types.has('sanxian') && e.type === 'sanxian');
          if (!match) return false;
        }
        return true;
      });
      if (filtered.length === 0) {
        document.getElementById('content').innerHTML =
          `<div class="empty-state"><div class="icon">&#128533;</div><p>${dateStr} 在目前篩選條件下沒有結果</p></div>`;
        return;
      }
      renderDateResults(dateStr, filtered);
    }

    function renderDateResults(dateStr, entries) {
      const stockMap = {};
      for (const e of entries) {
        if (!stockMap[e.stock_id]) {
          stockMap[e.stock_id] = {
            stock_id: e.stock_id, stock_name: e.stock_name, market: e.market, industry: e.industry,
            is_strong: false, is_new_high: false, is_sanxian: false, return_20d: null, gap_ratio: null,
          };
        }
        const s = stockMap[e.stock_id];
        if (e.type === 'vcp') {
          if (e.is_strong) s.is_strong = true;
          if (e.is_new_high) s.is_new_high = true;
          if (e.return_20d != null) s.return_20d = e.return_20d;
        } else {
          s.is_sanxian = true;
          if (e.gap_ratio != null) s.gap_ratio = e.gap_ratio;
        }
      }
      const merged = Object.values(stockMap);
      // New/old
      const recentStockIds = getRecentStockIds(dateStr);
      for (const s of merged) {
        s.isNew = !recentStockIds.has(s.stock_id);
        s._date = dateStr;
      }
      sortStocks(merged);

      const strongCount = merged.filter(s => s.is_strong).length;
      const newHighCount = merged.filter(s => s.is_new_high).length;
      const sanxianCount = merged.filter(s => s.is_sanxian).length;
      const bothCount = merged.filter(s => (s.is_strong || s.is_new_high) && s.is_sanxian).length;
      const newCount = merged.filter(s => s.isNew).length;

      let html = `<div class="section-header">
        <div class="section-title"><span>${dateStr}</span></div>
        <div class="section-count">
          共 ${merged.length} 檔（新 ${newCount} / 舊 ${merged.length - newCount} / VCP強勢 ${strongCount} / VCP新高 ${newHighCount} / 三線開花 ${sanxianCount}${bothCount > 0 ? ` / 同時上榜 ${bothCount}` : ''}）
        </div>
      </div>`;
      const rows = merged.map(s => renderDateStockRow(s)).join('');
      html += `<div class="sheet"><div class="sheet-scroll">
        <div class="sheet-head">
          <span>新舊</span><span>股號</span><span>股名</span><span>類型</span><span>產業</span>
          <span class="num">20日漲幅</span><span class="num">突破差距</span>
        </div>
        ${rows}
      </div></div>`;
      document.getElementById('content').innerHTML = `<div class="results">${html}</div>`;
      currentVisibleStocks = merged.map(s => ({
        stock_id: s.stock_id,
        market: s.market,
        isNew: s.isNew,
        stock_name: (INDEX.stocks[s.stock_id] && INDEX.stocks[s.stock_id].n) || ''
      }));
    }

    function renderDateStockRow(s) {
      const tags = buildTags(s, s._date, s.stock_id);
      const newOldCls = s.isNew ? 'is-new' : 'is-old';
      const newOldLabel = s.isNew ? '<span class="new-old-label is-new">新</span>' : '<span class="new-old-label is-old">舊</span>';

      // 數字欄：有值顯示帶號百分比並著色，無值顯示「-」
      const numCell = (v) => {
        if (v == null) return `<span class="sheet-cell num dash">-</span>`;
        const cls = v >= 0 ? 'positive' : 'negative';
        const sign = v >= 0 ? '+' : '';
        return `<span class="sheet-cell num ${cls}">${sign}${v.toFixed(2)}%</span>`;
      };

      return `<div class="sheet-row ${newOldCls}">
        <span class="sheet-cell">${newOldLabel}</span>
        <span class="sheet-cell"><span class="stock-id">${escapeHtml(s.stock_id)}</span></span>
        <span class="sheet-cell c-name">${escapeHtml(s.stock_name)}</span>
        <span class="sheet-cell sheet-tags">${tags}</span>
        <span class="sheet-cell c-industry">${escapeHtml(s.industry)}</span>
        ${numCell(s.return_20d)}
        ${numCell(s.gap_ratio)}
      </div>`;
    }

    // === Helpers ===
    // 近 N 個交易日內出現過視為「舊股」，N 日內首次出現為「新股」
    const NEW_STOCK_LOOKBACK = 20;

    function getRecentStockIds(dateStr) {
      const idx = ALL_DATES.indexOf(dateStr);
      if (idx < 0) return new Set();
      // ALL_DATES 為降冪，dateStr 之後（idx+1 起）為更早的交易日，取近 N 個的聯集
      const recentDates = ALL_DATES.slice(idx + 1, idx + 1 + NEW_STOCK_LOOKBACK);
      const ids = new Set();
      for (const d of recentDates) {
        const entries = DATE_INDEX[d];
        if (entries) for (const e of entries) ids.add(e.stock_id);
      }
      return ids;
    }

    function getFilteredStocksForDate(dateStr) {
      const entries = DATE_INDEX[dateStr];
      if (!entries) return [];
      const filtered = entries.filter(e => {
        if (e.market !== activeFilters.market) return false;
        if (activeFilters.types.size > 0) {
          const match = (activeFilters.types.has('strong') && e.type === 'vcp' && e.is_strong)
            || (activeFilters.types.has('newhigh') && e.type === 'vcp' && e.is_new_high)
            || (activeFilters.types.has('sanxian') && e.type === 'sanxian');
          if (!match) return false;
        }
        return true;
      });
      const map = {};
      for (const e of filtered) {
        if (!map[e.stock_id]) {
          map[e.stock_id] = { stock_id: e.stock_id, stock_name: e.stock_name, market: e.market };
        }
      }
      return Object.values(map);
    }

    function sortStocks(arr) {
      const safeNum = v => (v != null && isFinite(v)) ? v : -Infinity;
      switch (currentSort) {
        case 'return':
          arr.sort((a, b) => safeNum(b.return_20d) - safeNum(a.return_20d)); break;
        case 'gap':
          arr.sort((a, b) => safeNum(b.gap_ratio) - safeNum(a.gap_ratio)); break;
        default: // new-first（預設）：新股優先，其次依 20 日漲幅
          arr.sort((a, b) => { if (a.isNew !== b.isNew) return a.isNew ? -1 : 1; return safeNum(b.return_20d) - safeNum(a.return_20d); });
      }
    }

    const isMobile = () => window.innerWidth <= 600;
    let IND_CACHE = {}; // { "2026-03": { "2026-03-20": { "2330": { "v": {...} } } } }

    async function loadIndicators(month) {
      if (IND_CACHE[month]) return IND_CACHE[month];
      try {
        const data = await fetchJSON(`data/indicators/${month}.json`);
        IND_CACHE[month] = data;
        return data;
      } catch { return null; }
    }

    function buildTags(item, dateStr, stockId) {
      let tags = '';
      const m = isMobile();
      const dataAttr = dateStr && stockId ? ` data-date="${dateStr}" data-sid="${stockId}"` : '';
      if (item.is_strong) tags += `<span class="tag strong"${dataAttr} data-tt="vs">${m ? 'V強' : 'VCP強勢'}</span> `;
      if (item.is_new_high) tags += `<span class="tag newhigh"${dataAttr} data-tt="vh">${m ? 'V新高' : 'VCP新高'}</span> `;
      if (item.is_sanxian) tags += `<span class="tag sanxian"${dataAttr} data-tt="sx">${m ? '三花' : '三線開花'}</span> `;
      return tags;
    }

    function fmtVal(v) { return v != null ? v.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) : '-'; }
    function fmtPct(v) { return v != null ? (v * 100).toFixed(2) + '%' : '-'; }

    function buildTooltipHtml(type, ind) {
      if (!ind) return '<span class="tooltip"><span class="t-label">無指標資料</span></span>';
      if (type === 'vs') {
        return `<span class="tooltip">
          <span class="t-label">收盤</span> <span class="t-val">${fmtVal(ind.close)}</span><br>
          <span class="t-label">MA50</span> <span class="t-val">${fmtVal(ind.ma50)}</span> &gt;
          <span class="t-label">MA150</span> <span class="t-val">${fmtVal(ind.ma150)}</span> &gt;
          <span class="t-label">MA200</span> <span class="t-val">${fmtVal(ind.ma200)}</span><br>
          <span class="t-label">MA200趨勢</span> <span class="t-val">${ind.ma200_slope != null ? (ind.ma200_slope > 0 ? '↑' : '↓') : '-'}</span> (${fmtVal(ind.ma200_slope)})<br>
          <span class="t-label">20日漲幅</span> <span class="t-val">${fmtPct(ind.return_20d)}</span> &gt; 大盤 <span class="t-val">${fmtPct(ind.market_return)}</span>
        </span>`;
      } else if (type === 'vh') {
        const high52w = ind.high_260d || ind.high_252d;
        const gap = (ind.high_5d && high52w) ? Math.abs(ind.high_5d / high52w - 1) : null;
        return `<span class="tooltip">
          <span class="t-label">5日高點</span> <span class="t-val">${fmtVal(ind.high_5d)}</span><br>
          <span class="t-label">52週高點</span> <span class="t-val">${fmtVal(high52w)}</span><br>
          <span class="t-label">差距</span> <span class="t-val">${gap != null ? (gap*100).toFixed(2)+'%' : '-'}</span><br>
          <span class="t-label">20日漲幅</span> <span class="t-val">${fmtPct(ind.return_20d)}</span> &gt; 大盤 <span class="t-val">${fmtPct(ind.market_return)}</span>
        </span>`;
      } else {
        return `<span class="tooltip">
          <span class="t-label">收盤</span> <span class="t-val">${fmtVal(ind.close)}</span><br>
          <span class="t-label">MA8</span> <span class="t-val">${fmtVal(ind.ma8)}</span> &gt;
          <span class="t-label">MA21</span> <span class="t-val">${fmtVal(ind.ma21)}</span> &gt;
          <span class="t-label">MA55</span> <span class="t-val">${fmtVal(ind.ma55)}</span><br>
          <span class="t-label">55日高點</span> <span class="t-val">${fmtVal(ind.high_55d)}</span>
          <span class="t-label">次高價</span> <span class="t-val">${fmtVal(ind.second_high)}</span>
        </span>`;
      }
    }

    function renderAppearanceRow(a, stockId) {
      const tags = buildTags(a, a.date, stockId);
      const recentIds = getRecentStockIds(a.date);
      const isNew = recentIds.size === 0 || !recentIds.has(stockId);
      const newOldCls = isNew ? 'is-new' : 'is-old';
      const newOldLabel = isNew ? '<span class="new-old-label is-new">新</span>' : '<span class="new-old-label is-old">舊</span>';
      let details = '';
      if (a.return_20d != null) {
        const cls = a.return_20d >= 0 ? 'positive' : 'negative';
        const sign = a.return_20d >= 0 ? '+' : '';
        details += `<span class="detail-value ${cls}"><span class="detail-label">20日漲幅</span>${sign}${a.return_20d.toFixed(2)}%</span>`;
      }
      if (a.gap_ratio != null) {
        const cls = a.gap_ratio >= 0 ? 'positive' : 'negative';
        const sign = a.gap_ratio >= 0 ? '+' : '';
        details += `<span class="detail-value ${cls}"><span class="detail-label">突破差距</span>${sign}${a.gap_ratio.toFixed(2)}%</span>`;
      }
      return `<div class="appearance-item ${newOldCls}">
        <span class="date-text">${a.date}</span>
        ${newOldLabel} ${tags} ${details}
      </div>`;
    }

    function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    function triggerCurrentSearch() {
      if (currentMode === 'stock') {
        const q = document.getElementById('searchInput').value;
        if (q.trim()) searchStock(q);
      } else {
        const d = document.getElementById('dateInput').value;
        if (d) searchByDate(d);
      }
    }

    function navigateDate(direction) {
      const cur = document.getElementById('dateInput').value;
      if (!cur || ALL_DATES.length === 0) return;
      const idx = ALL_DATES.indexOf(cur);
      const newIdx = direction === 'prev'
        ? (idx === -1 ? 0 : Math.min(idx + 1, ALL_DATES.length - 1))
        : (idx === -1 ? 0 : Math.max(idx - 1, 0));
      document.getElementById('dateInput').value = ALL_DATES[newIdx];
      searchByDate(ALL_DATES[newIdx]);
    }

    // === 操作提示 Toast ===
    const PASTE_KEY = /Mac|iPhone|iPad/.test(navigator.platform || navigator.userAgent) ? '⌘V' : 'Ctrl+V';
    let _toastTimer;
    function showToast(title, descHtml, ms = 8000) {
      document.getElementById('toastTitle').textContent = title;
      document.getElementById('toastDesc').innerHTML = descHtml;
      const w = document.getElementById('toastWrap');
      w.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => w.classList.remove('show'), ms);
    }

    // === 匯出教學 Modal ===
    function showExportModal(title, bodyHtml, actionsHtml) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = bodyHtml;
      document.getElementById('modalActions').innerHTML = actionsHtml;
      document.getElementById('exportModal').classList.add('show');
    }
    function closeExportModal() {
      document.getElementById('exportModal').classList.remove('show');
    }

    // === TradingView Export ===
    // onlyNew=true → 只複製新股；false → 複製目前篩選條件下的全部
    function exportToTradingView(onlyNew) {
      const source = onlyNew
        ? currentVisibleStocks.filter(s => s.isNew)
        : currentVisibleStocks;

      const btnId = onlyNew ? 'tvExportNewBtn' : 'tvExportAllBtn';
      const btnLabel = onlyNew ? '複製TV清單（新股）' : '複製TV清單（全部）';
      const btn = document.getElementById(btnId);

      if (source.length === 0) {
        // 沒有可複製的股票（例如今天沒有新股）→ 給明確回饋，不要無聲失敗
        const original = btn.textContent;
        btn.textContent = onlyNew ? '今天沒有新股' : '沒有可複製的股票';
        setTimeout(() => { btn.textContent = original; }, 2000);
        return;
      }

      const symbols = source.map(s => {
        if (s.market === 'tw') {
          const stock = INDEX.stocks[s.stock_id];
          const exchange = (stock && stock.e === 'tpex') ? 'TPEX' : 'TWSE';
          return `${exchange}:${s.stock_id}`;
        }
        return `${s.stock_id}`;
      });

      const text = symbols.join(',');
      navigator.clipboard.writeText(text).catch(() => {});
      btn.textContent = `已複製 ${symbols.length} 檔`;
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = btnLabel; btn.classList.remove('copied'); }, 2000);

      showExportModal(
        `已複製 ${symbols.length} 檔${onlyNew ? '「新股」' : ''}股票代號`,
        `<p class="modal-lead">開啟 TradingView 後，跟著下圖 3 步匯入清單（點圖可放大）：</p>` +
        `<div class="modal-step" data-n="1">在觀察清單右上角按「<b>＋</b>」符號</div>` +
        `<figure class="modal-figure"><img src="assets/tv-step1.png" alt="步驟1：在觀察清單右上角按＋" onclick="window.open('assets/tv-step1.png','_blank')"></figure>` +
        `<div class="modal-step" data-n="2">在「<b>新增商品</b>」搜尋框直接按 <kbd>${PASTE_KEY}</kbd> 貼上</div>` +
        `<figure class="modal-figure"><img src="assets/tv-step2.png" alt="步驟2：在新增商品搜尋框直接貼上" onclick="window.open('assets/tv-step2.png','_blank')"></figure>` +
        `<div class="modal-step" data-n="3">直接按 <kbd>Enter</kbd>，${symbols.length} 檔一次全部匯入</div>` +
        `<figure class="modal-figure"><img src="assets/tv-step3.png" alt="步驟3：直接按 Enter" onclick="window.open('assets/tv-step3.png','_blank')"></figure>` +
        `<p class="modal-done">✓ 完成！清單就會列出全部股票，逐檔看 K 線圖</p>` +
        `<figure class="modal-figure portrait"><img src="assets/tv-step4.png" alt="完成：觀察清單列出全部股票" onclick="window.open('assets/tv-step4.png','_blank')"></figure>`,
        `<a class="modal-btn" href="https://tw.tradingview.com/chart/" target="_blank" rel="noopener">開啟 TradingView →</a>` +
        `<button class="modal-btn secondary" onclick="closeExportModal()">我知道了</button>`
      );
    }

    // === Event Listeners ===
    document.querySelectorAll('.mode-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentMode = tab.dataset.mode;
        document.getElementById('stockMode').classList.toggle('hidden', currentMode !== 'stock');
        document.getElementById('dateMode').classList.toggle('hidden', currentMode !== 'date');
        document.getElementById('sortRow').classList.toggle('hidden', currentMode !== 'date');
        showEmptyState();
        if (currentMode === 'date') {
          const dateInput = document.getElementById('dateInput');
          if (!dateInput.value && ALL_DATES.length > 0) {
            dateInput.value = ALL_DATES[0];
          }
          if (dateInput.value) searchByDate(dateInput.value);
        }
      });
    });

    let searchTimer = null;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => searchStock(e.target.value), 300);
    });
    let dateTimer = null;
    document.getElementById('dateInput').addEventListener('change', (e) => {
      clearTimeout(dateTimer);
      dateTimer = setTimeout(() => searchByDate(e.target.value), 400);
    });
    document.getElementById('datePrev').addEventListener('click', () => navigateDate('prev'));
    document.getElementById('dateNext').addEventListener('click', () => navigateDate('next'));
    document.getElementById('tvExportNewBtn').addEventListener('click', () => exportToTradingView(true));
    document.getElementById('tvExportAllBtn').addEventListener('click', () => exportToTradingView(false));

    // 市場主切換：台股 / 美股（完全分開，選定後只看該市場）
    document.querySelectorAll('.market-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        if (tab.classList.contains('active')) return;
        document.querySelectorAll('.market-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeFilters.market = tab.dataset.market;
        triggerCurrentSearch();
      });
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const f = btn.dataset.filter;
        const group = btn.dataset.group;

        if (group === 'type') {
          // 類型：多選 toggle
          btn.classList.toggle('active');
          if (btn.classList.contains('active')) {
            activeFilters.types.add(f);
          } else {
            activeFilters.types.delete(f);
          }
        }

        triggerCurrentSearch();
      });
    });

    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        triggerCurrentSearch();
      });
    });

    // Floating tooltip: attached to <body> so it escapes the sheet's overflow
    // clipping (.sheet-cell overflow:hidden / .sheet-scroll overflow-x:auto).
    let floatingTip = null;
    function closeFloatingTip() {
      if (floatingTip) { floatingTip.remove(); floatingTip = null; }
      document.querySelectorAll('.tag.tooltip-open').forEach(t => t.classList.remove('tooltip-open'));
    }
    function makeTip(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html.trim();
      const el = tmp.firstElementChild;
      el.classList.add('floating');
      return el;
    }
    function positionTip(tag, tip) {
      const r = tag.getBoundingClientRect();
      const vw = document.documentElement.clientWidth;
      const half = tip.offsetWidth / 2;
      const margin = 8;
      let cx = r.left + r.width / 2;
      cx = Math.max(half + margin, Math.min(cx, vw - half - margin));
      tip.style.left = cx + 'px';
      tip.style.top = (r.top - 8) + 'px';
    }

    // Tag click → load indicator on demand and show floating tooltip
    document.addEventListener('click', async (e) => {
      const tag = e.target.closest('.tag');
      if (!tag) { closeFloatingTip(); return; }

      e.stopPropagation();

      // Toggle off if this tag is already open
      if (tag.classList.contains('tooltip-open')) { closeFloatingTip(); return; }
      closeFloatingTip();

      const dt = tag.dataset.date;
      const sid = tag.dataset.sid;
      const ttType = tag.dataset.tt; // vs, vh, sx
      if (!dt || !sid) return;

      // Show loading tip
      tag.classList.add('tooltip-open');
      floatingTip = makeTip('<span class="tooltip"><span class="t-label">載入中...</span></span>');
      document.body.appendChild(floatingTip);
      positionTip(tag, floatingTip);

      const month = dt.substring(0, 7);
      const indData = await loadIndicators(month);

      // Guard: user may have closed/switched tag during the await
      if (!tag.classList.contains('tooltip-open') || !floatingTip) return;

      const indKey = (ttType === 'sx') ? 's' : 'v';
      const ind = indData?.[dt]?.[sid]?.[indKey] || null;
      const real = makeTip(buildTooltipHtml(ttType, ind));
      floatingTip.replaceWith(real);
      floatingTip = real;
      positionTip(tag, floatingTip);
    });

    // Keep the floating tip anchored to its tag: close it on scroll/resize
    window.addEventListener('scroll', () => { if (floatingTip) closeFloatingTip(); }, true);
    window.addEventListener('resize', () => { if (floatingTip) closeFloatingTip(); });

    loadIndex();
  </script>
</body>
</html>
