# 美股歷史全部重算（新高＝突破前 250 交易日最高價）
# 在 runner 上下載 us-db-backup → 重算全部日期 → 驗證 → 回傳 Release。
# 手動觸發用；重算不觸及 Google Sheet，故不需憑證。
name: Recompute US New-High

on:
  workflow_dispatch:

concurrency:
  group: us-db-write
  cancel-in-progress: false

jobs:
  recompute-us:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download US database from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          gh release download us-db-backup -p "zf_trend_us.db.gz" -D /tmp/
          gunzip -c /tmp/zf_trend_us.db.gz > data/zf_trend_us.db
          rm /tmp/zf_trend_us.db.gz
          ls -lh data/zf_trend_us.db

      - name: Recompute new-high across all dates
        run: |
          python scripts/recompute_new_high.py --us

      - name: Verify recompute
        run: |
          python - <<'PY'
          import sqlite3
          c = sqlite3.connect('data/zf_trend_us.db')
          d = c.execute("SELECT COUNT(DISTINCT filter_date) FROM us_filter_result").fetchone()[0]
          mx = c.execute("SELECT MAX(filter_date) FROM us_filter_result").fetchone()[0]
          tot = c.execute("SELECT COUNT(*) FROM us_filter_result WHERE filter_type='vcp'").fetchone()[0]
          nh = c.execute("SELECT COUNT(*) FROM us_filter_result WHERE filter_type='vcp' AND is_new_high_list=1").fetchone()[0]
          ij = c.execute("SELECT COUNT(*) FROM us_filter_result WHERE filter_type='vcp' AND indicator_json LIKE '%high_250d%'").fetchone()[0]
          print(f"日期數={d}, 最新={mx}, VCP={tot}, 新高={nh}, high_250d={ij}/{tot}")
          assert ij == tot and ij > 0, "high_250d 未覆蓋全部 VCP 列，重算異常"
          print("✅ 驗證通過")
          PY

      - name: Backup US database to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gzip -c data/zf_trend_us.db > /tmp/zf_trend_us.db.gz
          gh release upload us-db-backup /tmp/zf_trend_us.db.gz --clobber
          echo "✅ 已上傳重算後美股 DB"
