# 部署篩選結果查詢網站到 GitHub Pages
name: Deploy Site

on:
  # 在台股/美股每日任務完成後觸發
  workflow_run:
    workflows:
      - "Daily Stock Screening"
      - "US Daily Stock Screening"
    types: [completed]

  # 手動觸發
  workflow_dispatch:

# 設定 GITHUB_TOKEN 權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只能有一個部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 下載台股資料庫
      - name: Download TW database from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          if gh release download db-backup -p "zf_trend_full.db.gz" -D /tmp/ 2>/dev/null; then
            gunzip -c /tmp/zf_trend_full.db.gz > data/zf_trend.db
            echo "✅ 台股資料庫下載完成"
          else
            echo "⚠️ 台股資料庫不存在"
          fi
        continue-on-error: true

      # 下載美股資料庫
      - name: Download US database from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release download us-db-backup -p "zf_trend_us.db.gz" -D /tmp/ 2>/dev/null; then
            gunzip -c /tmp/zf_trend_us.db.gz > data/zf_trend_us.db
            echo "✅ 美股資料庫下載完成"
          else
            echo "⚠️ 美股資料庫不存在"
          fi
        continue-on-error: true

      # 回填三線開花的 20 日漲幅（歷史 filter_result 的 sanxian return_20d 原為 NULL）
      # export 本身為純標準庫，回填需 pandas
      - name: Install backfill deps
        run: pip install pandas

      - name: Backfill sanxian return_20d
        run: |
          python scripts/backfill_sanxian_return.py || echo "⚠️ 台股回填略過"
          python scripts/backfill_sanxian_return.py --us || echo "⚠️ 美股回填略過"

      # 匯出 JSON（v2 分月格式）
      - name: Export filter results to JSON
        run: python scripts/export_to_json_v2.py

      # 設定 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 上傳 site/ 資料夾
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
