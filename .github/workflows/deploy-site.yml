# 部署篩選結果查詢網站到 GitHub Pages
name: Deploy Site

on:
  # 在台股/美股每日任務完成後觸發
  workflow_run:
    workflows:
      - "Daily Stock Screening"
      - "US Daily Stock Screening"
    types: [completed]

  # 手動觸發
  workflow_dispatch:

# 設定 GITHUB_TOKEN 權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只能有一個部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 下載台股資料庫
      - name: Download TW database from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          if gh release download db-backup -p "zf_trend_full.db.gz" -D /tmp/ 2>/dev/null; then
            gunzip -c /tmp/zf_trend_full.db.gz > data/zf_trend.db
            echo "✅ 台股資料庫下載完成"
          else
            echo "⚠️ 台股資料庫不存在"
          fi
        continue-on-error: true

      # 下載美股資料庫
      - name: Download US database from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release download us-db-backup -p "zf_trend_us.db.gz" -D /tmp/ 2>/dev/null; then
            gunzip -c /tmp/zf_trend_us.db.gz > data/zf_trend_us.db
            echo "✅ 美股資料庫下載完成"
          else
            echo "⚠️ 美股資料庫不存在"
          fi
        continue-on-error: true

      # 同步「自訂產業連結」Sheet → DB，讓 Sheet 上的編輯不必等隔天 daily 才上線。
      # 只更新 runner 上的暫時 DB 副本，不回傳 Release（Sheet 才是唯一真實來源，
      # daily task 的 Step 1.5 每天會再同步一次），因此沒有搶 Release 備份的競態。
      - name: Set up Google credentials
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          if [ -n "$GOOGLE_CREDS" ]; then
            echo "$GOOGLE_CREDS" > credentials.json
            echo "✅ Google credentials 已設定"
          else
            echo "⚠️ 未設定 GOOGLE_CREDENTIALS_JSON，將略過自訂欄位同步"
          fi

      - name: Sync custom industry/link overrides from Sheet
        env:
          GOOGLE_CREDENTIALS_PATH: credentials.json
          SHEET_ID_COMPANY_MASTER: ${{ secrets.SHEET_ID_COMPANY_MASTER }}
          US_SHEET_ID_COMPANY_MASTER: ${{ secrets.US_SHEET_ID_COMPANY_MASTER }}
        run: python scripts/sync_custom_overrides.py
        continue-on-error: true

      # 匯出 JSON（v2 分月格式）
      # 三線 return_20d 已由 sanxian_filter 每日寫入 + Release DB 一次性回填（scripts/backfill_sanxian_return.py）
      - name: Export filter results to JSON
        run: python scripts/export_to_json_v2.py

      # 設定 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 上傳 site/ 資料夾
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
