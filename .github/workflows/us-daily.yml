# 美股每日篩選任務
name: US Daily Stock Screening

on:
  # 美股收盤後執行（美東 16:00 = UTC 21:00，延後 30 分鐘確保資料就緒）
  # 已改用外部觸發（Google Apps Script 定時打 workflow_dispatch），
  # 因 GitHub 內建 schedule 實測延遲 2.7~13 小時、且不穩定。
  # 以下 schedule 保留當備援，取消註解即可恢復（時間維持原本 UTC 21:30）。
  # schedule:
  #   - cron: '30 21 * * 1-5'  # 週一至週五 UTC 21:30（台灣 05:30）

  # 手動觸發
  workflow_dispatch:
    inputs:
      target_date:
        description: '目標日期 (YYYY-MM-DD，留空使用今天)'
        required: false
        default: ''
      force:
        description: '強制執行（忽略假日）'
        required: false
        default: 'false'
        type: boolean

jobs:
  us-daily-task:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 從 GitHub Release 下載美股資料庫
      - name: Download US database from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          echo "嘗試從 Release 下載美股資料庫..."
          if gh release download us-db-backup -p "zf_trend_us.db.gz" -D /tmp/ 2>/dev/null; then
            echo "解壓縮美股資料庫..."
            gunzip -c /tmp/zf_trend_us.db.gz > data/zf_trend_us.db
            rm /tmp/zf_trend_us.db.gz
            echo "✅ 美股資料庫還原成功"
            ls -lh data/zf_trend_us.db
          else
            echo "⚠️ Release 中沒有美股資料庫"
          fi
        continue-on-error: true

      - name: Set up Google credentials
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          if [ -n "$GOOGLE_CREDS" ]; then
            echo "$GOOGLE_CREDS" > credentials.json
            echo "✅ Google credentials 已設定"
          else
            echo "⚠️ 未設定 GOOGLE_CREDENTIALS_JSON"
          fi

      # 首次執行需要初始化
      - name: Initialize US system if needed
        env:
          GOOGLE_CREDENTIALS_PATH: credentials.json
          US_SHEET_ID_COMPANY_MASTER: ${{ secrets.US_SHEET_ID_COMPANY_MASTER }}
          US_SHEET_ID_VCP: ${{ secrets.US_SHEET_ID_VCP }}
          US_SHEET_ID_SANXIAN: ${{ secrets.US_SHEET_ID_SANXIAN }}
          US_SHEET_ID_VERIFICATION: ${{ secrets.US_SHEET_ID_VERIFICATION }}
        run: |
          if [ ! -f "data/zf_trend_us.db" ]; then
            echo "美股資料庫不存在，執行初始化..."
            python us_main.py init
          else
            echo "美股資料庫已存在，跳過初始化"
            ls -la data/zf_trend_us.db
          fi

      - name: Run US daily task
        timeout-minutes: 150
        env:
          GOOGLE_CREDENTIALS_PATH: credentials.json
          US_SHEET_ID_COMPANY_MASTER: ${{ secrets.US_SHEET_ID_COMPANY_MASTER }}
          US_SHEET_ID_VCP: ${{ secrets.US_SHEET_ID_VCP }}
          US_SHEET_ID_SANXIAN: ${{ secrets.US_SHEET_ID_SANXIAN }}
          US_SHEET_ID_VERIFICATION: ${{ secrets.US_SHEET_ID_VERIFICATION }}
        run: |
          if [ "${{ github.event.inputs.target_date }}" != "" ]; then
            if [ "${{ github.event.inputs.force }}" == "true" ]; then
              python us_main.py daily ${{ github.event.inputs.target_date }} --force
            else
              python us_main.py daily ${{ github.event.inputs.target_date }}
            fi
          else
            if [ "${{ github.event.inputs.force }}" == "true" ]; then
              python us_main.py daily --force
            else
              python us_main.py daily
            fi
          fi

      # 備份美股資料庫到 GitHub Release
      # if: always() — 即使 daily task step 失敗/timeout，仍要備份 DB
      # 避免「task cancel → DB 沒備份 → 隔天比對失準」的連鎖效應
      - name: Backup US database to Release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "備份美股資料庫到 Release..."
          if ! gh release view us-db-backup &>/dev/null; then
            echo "建立新的 Release..."
            gh release create us-db-backup \
              --title "US Database Backup" \
              --notes "美股 SQLite 資料庫自動備份 (永久保存)"
          fi
          echo "壓縮美股資料庫..."
          gzip -c data/zf_trend_us.db > /tmp/zf_trend_us.db.gz
          gh release upload us-db-backup /tmp/zf_trend_us.db.gz --clobber
          echo "✅ 美股備份完成"

      - name: Upload US logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: us-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
