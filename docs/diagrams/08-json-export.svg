<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 330" width="900" height="330">
  <defs>
    <marker id="arrow7" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="330" fill="#f8fafc" rx="12"/>

  <rect x="40" y="130" width="160" height="60" rx="10" fill="#cffafe" stroke="#0891b2"/>
  <text x="120" y="156" text-anchor="middle" font-size="12" fill="#155e75" font-weight="700">2 個 SQLite DB</text>
  <text x="120" y="174" text-anchor="middle" font-size="10" fill="#334155">filter_result（台/美）</text>
  <line x1="200" y1="160" x2="236" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow7)"/>
  <rect x="238" y="132" width="150" height="56" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="313" y="156" text-anchor="middle" font-size="11.5" fill="#5b21b6" font-weight="700">export_to_json_v2</text>
  <text x="313" y="174" text-anchor="middle" font-size="10" fill="#64748b">欄位精簡縮寫</text>

  <!-- 三產物 -->
  <line x1="388" y1="160" x2="430" y2="70" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow7)"/>
  <line x1="388" y1="160" x2="430" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow7)"/>
  <line x1="388" y1="160" x2="430" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow7)"/>

  <rect x="432" y="40" width="300" height="60" rx="10" fill="#fff" stroke="#059669" stroke-width="1.5"/>
  <text x="448" y="62" font-size="12" fill="#047857" font-weight="700">index.json　~1.2 MB</text>
  <text x="448" y="80" font-size="10" fill="#334155">股票主檔 + 月份清單 + 每股出現月份 ms</text>
  <text x="448" y="94" font-size="9.5" fill="#16a34a">首次載入（含全站搜尋索引）</text>

  <rect x="432" y="130" width="300" height="60" rx="10" fill="#fff" stroke="#059669" stroke-width="1.5"/>
  <text x="448" y="152" font-size="12" fill="#047857" font-weight="700">months/{YYYY-MM}.json　~1-2 MB</text>
  <text x="448" y="170" font-size="10" fill="#334155">該月篩選結果明細（d/id/t/r/s/h/g）</text>
  <text x="448" y="184" font-size="9.5" fill="#16a34a">瀏覽該月時才載</text>

  <rect x="432" y="220" width="300" height="60" rx="10" fill="#fff" stroke="#059669" stroke-width="1.5"/>
  <text x="448" y="242" font-size="12" fill="#047857" font-weight="700">indicators/{YYYY-MM}.json　~3 MB</text>
  <text x="448" y="260" font-size="10" fill="#334155">逐股指標（tooltip 用，v/s 兩組）</text>
  <text x="448" y="274" font-size="9.5" fill="#16a34a">點 tag 看指標時才載</text>

  <line x1="732" y1="160" x2="768" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow7)"/>
  <rect x="770" y="130" width="110" height="60" rx="10" fill="#1e293b"/>
  <text x="825" y="156" text-anchor="middle" font-size="11.5" fill="#fff" font-weight="700">GitHub</text>
  <text x="825" y="174" text-anchor="middle" font-size="11.5" fill="#fff" font-weight="700">Pages</text>
</svg>
