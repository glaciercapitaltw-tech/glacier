<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="340" fill="#f8fafc" rx="12"/>

  <rect x="30" y="30" width="180" height="56" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="120" y="52" text-anchor="middle" font-size="12.5" fill="#1e293b" font-weight="700">NASDAQ FTP</text>
  <text x="120" y="70" text-anchor="middle" font-size="10.5" fill="#64748b">全市場股票清單</text>
  <line x1="210" y1="58" x2="246" y2="58" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="248" y="30" width="180" height="56" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="338" y="52" text-anchor="middle" font-size="12.5" fill="#1e3a8a" font-weight="700">切批 40 檔/批</text>
  <text x="338" y="70" text-anchor="middle" font-size="10.5" fill="#334155">US_BATCH_SIZE=40</text>

  <!-- 迴圈框 -->
  <rect x="248" y="110" width="622" height="120" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-dasharray="6 4"/>
  <text x="264" y="132" font-size="12" fill="#1d4ed8" font-weight="700">⟳ 每批迴圈</text>
  <rect x="266" y="144" width="170" height="68" rx="8" fill="#fff" stroke="#93c5fd"/>
  <text x="351" y="166" text-anchor="middle" font-size="11.5" fill="#1e3a8a" font-weight="700">yf.download()</text>
  <text x="351" y="183" text-anchor="middle" font-size="10" fill="#334155">group_by="ticker"</text>
  <text x="351" y="198" text-anchor="middle" font-size="10" fill="#334155">auto_adjust=False</text>
  <line x1="436" y1="178" x2="462" y2="178" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="464" y="144" width="180" height="68" rx="8" fill="#fff" stroke="#93c5fd"/>
  <text x="554" y="166" text-anchor="middle" font-size="11.5" fill="#1e3a8a" font-weight="700">解析 + rename</text>
  <text x="554" y="183" text-anchor="middle" font-size="10" fill="#334155">單檔 / MultiIndex 兩路</text>
  <text x="554" y="198" text-anchor="middle" font-size="10" fill="#334155">→ open/high/low/close/adj_close</text>
  <line x1="644" y1="178" x2="670" y2="178" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="672" y="144" width="180" height="68" rx="8" fill="#fff" stroke="#fbbf24"/>
  <text x="762" y="170" text-anchor="middle" font-size="11.5" fill="#b45309" font-weight="700">sleep 15s</text>
  <text x="762" y="190" text-anchor="middle" font-size="10" fill="#334155">US_BATCH_INTERVAL</text>
  <!-- 迴圈回箭頭 -->
  <path d="M762,212 L762,222 L351,222 L351,212" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow2)"/>
  <text x="338" y="100" text-anchor="middle" font-size="10" fill="#64748b"></text>
  <line x1="338" y1="86" x2="338" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- 完整性檢查 + upsert -->
  <line x1="559" y1="230" x2="559" y2="258" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="300" y="260" width="520" height="58" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
  <text x="560" y="282" text-anchor="middle" font-size="12.5" fill="#155e75" font-weight="700">完整性檢查 → upsert_daily_price()（含 adj_close）</text>
  <text x="560" y="301" text-anchor="middle" font-size="10.5" fill="#334155">當日筆數 &lt; 6500 視為殘缺 → 重抓；缺料重試最多 3 次（5/15/15 分鐘）</text>
</svg>
